name: Deploy Bucket List

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            mrzahidxy/bucket-list:latest
            mrzahidxy/bucket-list:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR || '/opt/apps/bucket-list' }}"

            docker compose pull
            docker compose up -d
            docker image prune -f

            if [ -n "${{ secrets.LOCAL_HEALTHCHECK_URL }}" ]; then
              curl -fsS "${{ secrets.LOCAL_HEALTHCHECK_URL }}"
            fi

            if [ -n "${{ secrets.PUBLIC_HEALTHCHECK_URL }}" ]; then
              curl -fsS "${{ secrets.PUBLIC_HEALTHCHECK_URL }}"
            fi
